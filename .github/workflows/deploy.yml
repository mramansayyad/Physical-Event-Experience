name: Zero-Trust CI/CD

on:
  push:
    branches: [ "main", "production" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-scan:
    name: Govulncheck Execution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Govulncheck Vulnerability Sweeper
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  integration-tests:
    name: Sandbox Validation (Emulators)
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4
      
      - name: Spin Up Emulated Mesh
        run: docker compose -f deployments/docker-compose.test.yml up -d
        
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          
      - name: Run Table-Driven Protocol Executions
        run: go test -v ./...
        
      - name: Dismantle Secure Enclave
        if: always()
        run: docker compose -f deployments/docker-compose.test.yml down

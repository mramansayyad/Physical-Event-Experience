name: Continuous Infrastructure Prov and Deploy

on:
  push:
    branches:
      - main

# Principle of Least Privilege: Force OIDC ID-Token explicit authentication mapping
permissions:
  id-token: write 
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate Google Cloud explicitly mapping Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/12345/locations/global/workloadIdentityPools/github/providers/github-actions'
          service_account: 'stadium-deployer@stadium-experience-loc.iam.gserviceaccount.com'

      - name: Native Build & Push Artifact (Distroless Multi-Stage)
        run: |
          docker build -t gcr.io/stadium-experience-loc/stadium-api:${{ github.sha }} .
          gcloud auth configure-docker --quiet
          docker push gcr.io/stadium-experience-loc/stadium-api:${{ github.sha }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform CI Infrastructure Block Initialization
        working-directory: ./build/iac/terraform
        run: |
          terraform init
          terraform apply -auto-approve \
            -var="docker_image=gcr.io/stadium-experience-loc/stadium-api:${{ github.sha }}" \
            -var="project_id=stadium-experience-loc"
